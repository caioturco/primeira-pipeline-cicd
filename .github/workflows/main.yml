name: CI-CD
on:
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
    - name: "Obtendo o código"
      uses: actions/checkout@v4.2.2
    - name: "Autenticação no Docker Hub"
      uses: docker/login-action@v3
      with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: "Build imagem docker"
      uses: docker/build-push-action@v6
      with:
        context: ./src
        file: ./src/Dockerfile
        push: true
        tags: | 
          128905/aula-primeira-pipeline:v${{ github.run_number }}
          128905/aula-primeira-pipeline:latest
  CD:
    runs-on: ubuntu-latest
    needs: [CI]
    steps:
      - name: "Obtendo Código"
        uses:  actions/checkout@v4.2.2
      - name: "Configuração contexto K8s"
        uses: azure/k8s-set-context@v4.0.0
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.K8S_CONFIG }}
      - name: "Execução manifesto"
        uses: Azure/k8s-deploy@v5
        with:
          manifests: |
                ./k8s/deployment.yaml
          images: |
            128905/aula-primeira-pipeline:v${{ github.run_number }}

          
